; ---------------------------------------------------------------------------
; Production PHP settings for School Management System (shared hosting / cPanel).
;
; .user.ini is honoured by PHP-FPM / FastCGI / CGI (the common cPanel SAPIs).
; If your host runs mod_php instead, move these directives into php.ini or a
; per-account "MultiPHP INI Editor" entry — .user.ini is ignored under mod_php.
; ---------------------------------------------------------------------------

; --- Error handling: log, never display, in production ---
display_errors = Off
display_startup_errors = Off
log_errors = On

; --- Hide PHP version from response headers ---
expose_php = Off

; --- Session cookie hardening (applies to every session_start in the app) ---
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.use_only_cookies = 1
; Send the session cookie over HTTPS only. The app forces HTTPS via .htaccess,
; so this is safe. If you have NOT enabled SSL yet, leave this at 0 until you do,
; otherwise logins will silently fail.
session.cookie_secure = 1

; --- Upload limits (bulk student/staff import, document & logo uploads) ---
upload_max_filesize = 20M
post_max_size = 22M
max_file_uploads = 30

; --- Reasonable execution limits for report/PDF generation & imports ---
max_execution_time = 120
memory_limit = 256M
